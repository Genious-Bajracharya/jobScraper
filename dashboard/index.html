<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Alerts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --ink: #0a0a0a;
    --ink-2: #525252;
    --ink-3: #a3a3a3;
    --border: #e5e5e5;
    --border-strong: #d4d4d4;
    --accent: #4f46e5;
    --accent-soft: #eef2ff;
    --highlight: #fef3c7;
    --success: #059669;
    --danger: #dc2626;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* Header */
  header {
    margin-bottom: 32px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  h1 .accent {
    color: var(--accent);
  }

  .subtitle {
    color: var(--ink-2);
    font-size: 15px;
  }

  .stats {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-2);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .stat-num {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
  }

  .stat-new {
    color: var(--success);
  }

  /* Controls */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 12px;
    z-index: 10;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 15px;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 120ms, background 120ms;
  }

  #search:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .chips {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    border-radius: 999px;
    cursor: pointer;
    color: var(--ink-2);
    transition: all 120ms;
    user-select: none;
  }

  .chip:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  .chip.active {
    background: var(--ink);
    color: var(--surface);
    border-color: var(--ink);
  }

  /* Job list */
  #results-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 20px 4px 12px;
  }

  .job {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 10px;
    transition: border-color 120ms, transform 120ms;
  }

  .job:hover {
    border-color: var(--border-strong);
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }

  .job-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .job-title:hover {
    color: var(--accent);
  }

  .job-source {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .job-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 14px;
    color: var(--ink-2);
    margin-bottom: 12px;
  }

  .job-meta .sep {
    color: var(--ink-3);
  }

  .job-company {
    font-weight: 500;
    color: var(--ink);
  }

  .job-salary {
    font-family: var(--mono);
    color: var(--success);
    font-size: 13px;
    font-weight: 500;
  }

  .job-desc {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.55;
    margin-bottom: 14px;
  }

  .job-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .job-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .job-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    background: var(--bg);
    border-radius: 4px;
    color: var(--ink-2);
    border: 1px solid var(--border);
  }

  .apply-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--surface);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    transition: background 120ms;
  }

  .apply-btn:hover {
    background: var(--accent);
  }

  .job-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
  }

  /* Empty & loading states */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-2);
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: 12px;
  }

  .empty-title {
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .empty-hint {
    font-size: 14px;
  }

  /* Search highlight */
  mark {
    background: var(--highlight);
    color: var(--ink);
    padding: 1px 2px;
    border-radius: 2px;
  }

  /* Footer */
  footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    text-align: center;
    letter-spacing: 0.05em;
  }

  @media (max-width: 640px) {
    h1 { font-size: 32px; }
    .job-header { flex-direction: column; }
    .container { padding: 20px 16px 60px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">// job-alerts v1</div>
    <h1>Fresh jobs, <span class="accent">automatically</span>.</h1>
    <p class="subtitle">Remote developer roles pulled from 4 job boards every 6 hours.</p>
    <div class="stats" id="stats">
      <div class="stat"><span class="stat-num" id="stat-total">—</span><span>total jobs</span></div>
      <div class="stat"><span class="stat-num stat-new" id="stat-new">—</span><span>new this run</span></div>
      <div class="stat"><span id="stat-updated">Loading…</span></div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Filter by title, company, tag…" autocomplete="off">
    </div>
    <div class="chips" id="source-chips">
      <button class="chip active" data-source="all">All sources</button>
    </div>
  </div>

  <div id="results-meta"></div>
  <div id="results"></div>

  <footer>
    Built with node.js + github actions · zero cost forever
  </footer>
</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────
  // After you push to GitHub, replace these with YOUR values:
  const GITHUB_USER = 'YOUR_USERNAME';
  const GITHUB_REPO = 'job-alerts';
  const GITHUB_BRANCH = 'main';

  // Where jobs.json lives (raw GitHub content is free & fast)
  const JOBS_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${GITHUB_BRANCH}/data/jobs.json`;

  // Fallback: try local file first (for local dev / preview)
  const LOCAL_JOBS_URL = '../data/jobs.json';

  // ─── STATE ─────────────────────────────────────────────────────────────
  let allJobs = [];
  let activeSource = 'all';
  let searchTerm = '';

  // ─── LOAD ──────────────────────────────────────────────────────────────
  async function loadJobs() {
    // Try local first, then remote
    for (const url of [LOCAL_JOBS_URL, JOBS_URL]) {
      try {
        const res = await fetch(url);
        if (!res.ok) continue;
        const data = await res.json();
        return data;
      } catch { /* try next */ }
    }
    return null;
  }

  function fmtRelative(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    const days = Math.floor(diff / 86400);
    if (days < 30) return `${days}d ago`;
    return d.toLocaleDateString();
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  function highlight(text, term) {
    const safe = escapeHtml(text);
    if (!term) return safe;
    const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return safe.replace(re, '<mark>$1</mark>');
  }

  // ─── RENDER ────────────────────────────────────────────────────────────
  function renderStats(data) {
    document.getElementById('stat-total').textContent = data.total ?? '0';
    document.getElementById('stat-new').textContent = `+${data.newSinceLastRun ?? 0}`;
    document.getElementById('stat-updated').textContent =
      `updated ${fmtRelative(data.updatedAt)}`;
  }

  function renderSourceChips(jobs) {
    const sources = [...new Set(jobs.map(j => j.source))].sort();
    const chips = document.getElementById('source-chips');
    chips.innerHTML = '<button class="chip active" data-source="all">All sources</button>' +
      sources.map(s => `<button class="chip" data-source="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join('');

    chips.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        activeSource = btn.dataset.source;
        chips.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === btn));
        renderJobs();
      });
    });
  }

  function renderJobs() {
    const results = document.getElementById('results');
    const meta = document.getElementById('results-meta');

    let filtered = allJobs;

    if (activeSource !== 'all') {
      filtered = filtered.filter(j => j.source === activeSource);
    }

    if (searchTerm) {
      const t = searchTerm.toLowerCase();
      filtered = filtered.filter(j => {
        const hay = [j.title, j.company, j.location, ...(j.tags || [])].join(' ').toLowerCase();
        return hay.includes(t);
      });
    }

    meta.textContent = `Showing ${filtered.length} of ${allJobs.length} jobs`;

    if (filtered.length === 0) {
      results.innerHTML = `
        <div class="empty">
          <div class="empty-title">No matches</div>
          <div class="empty-hint">Try a different search term or source filter.</div>
        </div>`;
      return;
    }

    results.innerHTML = filtered.map(j => {
      const tags = (j.tags || []).slice(0, 6).map(t =>
        `<span class="job-tag">${escapeHtml(t)}</span>`
      ).join('');

      return `
        <article class="job">
          <div class="job-header">
            <a class="job-title" href="${escapeHtml(j.url)}" target="_blank" rel="noopener">
              ${highlight(j.title, searchTerm)}
            </a>
            <span class="job-source">${escapeHtml(j.source)}</span>
          </div>
          <div class="job-meta">
            <span class="job-company">${highlight(j.company, searchTerm)}</span>
            <span class="sep">·</span>
            <span>${escapeHtml(j.location)}</span>
            ${j.salary ? `<span class="sep">·</span><span class="job-salary">${escapeHtml(j.salary)}</span>` : ''}
          </div>
          ${j.description ? `<p class="job-desc">${escapeHtml(j.description.slice(0, 220))}${j.description.length > 220 ? '…' : ''}</p>` : ''}
          <div class="job-footer">
            <div class="job-tags">${tags}</div>
            <div style="display:flex;gap:12px;align-items:center;">
              <span class="job-date">${fmtRelative(j.postedAt)}</span>
              <a class="apply-btn" href="${escapeHtml(j.url)}" target="_blank" rel="noopener">
                View & apply
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H8M17 7V16"/></svg>
              </a>
            </div>
          </div>
        </article>`;
    }).join('');
  }

  // ─── INIT ──────────────────────────────────────────────────────────────
  (async () => {
    const data = await loadJobs();
    if (!data) {
      document.getElementById('results').innerHTML = `
        <div class="empty">
          <div class="empty-title">No jobs.json found yet</div>
          <div class="empty-hint">Run the scraper once, then push to GitHub. Or update GITHUB_USER in this file.</div>
        </div>`;
      return;
    }
    allJobs = data.jobs || [];
    renderStats(data);
    renderSourceChips(allJobs);
    renderJobs();
  })();

  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    searchTerm = e.target.value.trim();
    renderJobs();
  });
</script>
</body>
</html>
